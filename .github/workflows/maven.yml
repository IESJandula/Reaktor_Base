name: Publicar librería en Nexus

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      NEXUS_PUBLISH_USERNAME: ${{ secrets.NEXUS_PUBLISH_USERNAME }}
      NEXUS_PUBLISH_PASSWORD: ${{ secrets.NEXUS_PUBLISH_PASSWORD }}

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java 17 y cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Crear settings.xml temporal
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/maven"

          cat > "$RUNNER_TEMP/maven/settings.xml" <<'EOF'
          <settings>
            <servers>
              <!-- Para publicar la librería -->
              <server>
                <id>nexus-deploy</id>
                <username>${env.NEXUS_PUBLISH_USERNAME}</username>
                <password>${env.NEXUS_PUBLISH_PASSWORD}</password>
              </server>

              <!-- Para descargar Spring, Firebase y demás dependencias -->
              <server>
                <id>nexus-public</id>
                <username>${env.NEXUS_PUBLISH_USERNAME}</username>
                <password>${env.NEXUS_PUBLISH_PASSWORD}</password>
              </server>
            </servers>

            <mirrors>
              <mirror>
                <id>nexus-public</id>
                <name>Nexus Maven Public</name>
                <url>https://nexus.iesjandula.es/repository/maven-public/</url>
                <mirrorOf>*</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Verificar acceso al parent en Nexus
        shell: bash
        run: |
          set -euo pipefail

          URL="https://nexus.iesjandula.es/repository/maven-public/es/iesjandula/reaktor/Dependencies/2.0.0-SNAPSHOT/maven-metadata.xml"

          curl --fail --silent --show-error \
            --user "${NEXUS_PUBLISH_USERNAME}:${NEXUS_PUBLISH_PASSWORD}" \
            "$URL" \
            -o "$RUNNER_TEMP/dependencies-metadata.xml"

          echo "Metadatos descargados correctamente:"
          cat "$RUNNER_TEMP/dependencies-metadata.xml"

      - name: Compilar y publicar Base en Nexus
        run: |
          rm -rf "$HOME/.m2/repository/es/iesjandula/reaktor/Dependencies"

          mvn --batch-mode --no-transfer-progress -U \
            --settings "$RUNNER_TEMP/maven/settings.xml" \
            clean deploy

      - name: Borrar settings temporal
        if: always()
        run: rm -rf "$RUNNER_TEMP/maven"