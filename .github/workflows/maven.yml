name: Publicar librería en Nexus

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      NEXUS_PUBLISH_USERNAME: ${{ secrets.NEXUS_PUBLISH_USERNAME }}
      NEXUS_PUBLISH_PASSWORD: ${{ secrets.NEXUS_PUBLISH_PASSWORD }}

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java 17 y cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Crear settings.xml temporal
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/maven"

          cat > "$RUNNER_TEMP/maven/settings.xml" <<'EOF'
          <settings>
            <servers>
              <!-- Publicar en maven-releases / maven-snapshots -->
              <server>
                <id>nexus-deploy</id>
                <username>${env.NEXUS_PUBLISH_USERNAME}</username>
                <password>${env.NEXUS_PUBLISH_PASSWORD}</password>
              </server>

              <!-- Repositorio directo, necesario para SNAPSHOT -->
              <server>
                <id>nexus-public</id>
                <username>${env.NEXUS_PUBLISH_USERNAME}</username>
                <password>${env.NEXUS_PUBLISH_PASSWORD}</password>
              </server>

              <!-- Mirror para Central y cualquier otro repositorio -->
              <server>
                <id>nexus-mirror</id>
                <username>${env.NEXUS_PUBLISH_USERNAME}</username>
                <password>${env.NEXUS_PUBLISH_PASSWORD}</password>
              </server>
            </servers>

            <profiles>
              <profile>
                <id>reaktor-nexus</id>

                <repositories>
                  <repository>
                    <id>nexus-public</id>
                    <name>Nexus Maven Public</name>
                    <url>https://nexus.iesjandula.es/repository/maven-public/</url>

                    <releases>
                      <enabled>true</enabled>
                    </releases>

                    <snapshots>
                      <enabled>true</enabled>
                      <updatePolicy>always</updatePolicy>
                    </snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>

            <activeProfiles>
              <activeProfile>reaktor-nexus</activeProfile>
            </activeProfiles>

            <mirrors>
              <mirror>
                <id>nexus-mirror</id>
                <name>Nexus para repositorios externos</name>
                <url>https://nexus.iesjandula.es/repository/maven-public/</url>

                <!-- Todo pasa por Nexus, salvo el repositorio directo
                     que acabamos de declarar para snapshots -->
                <mirrorOf>*,!nexus-public</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Compilar y publicar Base en Nexus
        run: |
          mvn --batch-mode --no-transfer-progress -U \
            --settings "$RUNNER_TEMP/maven/settings.xml" \
            clean deploy

      - name: Borrar settings temporal
        if: always()
        run: rm -rf "$RUNNER_TEMP/maven"